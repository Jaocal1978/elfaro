<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" type="image/png" href="../assets/img/logoPeq.png">

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

    <!--Estilos CSS-->
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- Incluye Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <title>El Faro - Contacto</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--fontawesome-->
    <script src="https://kit.fontawesome.com/c928e1895b.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Barra superior de avisos -->
    <div class="alert alert-warning alert-dismissible fade show fixed-top text-center mb-0 section-SubTitulo-h4" role="alert">
        ⚠️ Aviso importante: El sitio estará en mantenimiento mañana a las 10:00.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <header>
        <!-- Menu de navegación -->
        <nav class="navbar navbar-expand-lg " style="background-color: brown;" data-bs-theme="dark">
            <div class="container-fluid">
                <!-- Logo y nombre del sitio -->
                <a class="navbar-brand mx-auto d-flex align-items-center" href="#">
                    <img src="../assets/img/logo.png" alt="Logo El Faro" width="70" height="70" class="me-2">
                    <h4 class="titulo-nav-footer"><span>El Faro</span></h4>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="../index.html">
                                <i class="fa-solid fa-house-chimney"></i> Inicio
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../views/deportes.html">
                                <i class="fa-solid fa-person-walking"></i> Deportes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../views/negocios.html">
                                <i class="fa-solid fa-handshake"></i> Negocios
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../views/actualidad.html">
                                <i class="fa-solid fa-newspaper"></i> Actualidad
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../views/tiempo.html">
                                <i class="fa-solid fa-cloud-sun"></i> Tiempo
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../views/contacto.html">
                                <i class="fa-solid fa-address-book"></i> Contacto
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../views/mensajes.html">
                                <i class="fa-solid fa-message"></i> Mensajes
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section>
            <div class="container foot-Subtitulo">
                <div class="row">
                    <div class="col">
                        <div class="accordion mt-4 p-2" id="accordionExample">
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button bg-success text-white" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne"
                                        aria-expanded="true" aria-controls="collapseOne">
                                        <span><i class="fa-solid fa-id-badge"></i> Contacto</span>
                                    </button>
                                </h2>
                                <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                                    <div class="container">
                                        <div class="row">
                                            <div class="col">
                                                <form class="p-4" id="formContacto">
                                                    <div class="mb-3">
                                                        <label for="nombre" class="form-label">Nombre:</label>
                                                        <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre">
                                                    </div>
                                                    <div class="mb-3">
                                                        <label for="email" class="form-label">Email:</label>
                                                        <input type="email" class="form-control" id="email" placeholder="Ingresa tu email">
                                                    </div>
                                                    <div class="mb-3">
                                                        <label for="mensaje" class="form-label">Mensaje:</label>
                                                        <textarea class="form-control" id="mensaje" rows="3" placeholder="Escribe tu mensaje aquí"></textarea>
                                                    </div>
                                                    <div class="row">
                                                        <div class="col-lg-6 col-md-6 col-sm-12 d-flex justify-content-lg-end justify-content-sm-center mb-2 mb-lg-0">
                                                            <button type="submit" class="btn btn-primary w-100 w-md-auto w-lg-auto">
                                                                <i class="fa-solid fa-arrow-right-from-bracket"></i> Enviar mensaje
                                                            </button>
                                                        </div>
                                                        <div class="col-lg-6 col-md-6 col-sm-12 d-flex justify-content-lg-start justify-content-sm-center">
                                                            <a href="" id="btnCancelar" name="btnCancelar" type="button" class="btn btn-danger w-100 w-md-auto w-lg-auto">
                                                                <i class="fa-solid fa-circle-xmark"></i> Cancelar Mensaje
                                                            </a>
                                                        </div>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Sección de pie de página -->
    <footer class="bg-dark text-white mt-5">
        <div class="container py-4">
            <div class="row">

                <!-- Logo y nombre -->
                <div class="col-md-4 text-center text-md-start mb-3">

                    <h5 class="titulo-nav-footer">El Faro</h5>
                    <p class="foot-Subtitulo">Iluminando la noticia...</p>
                </div>

                <!-- Enlaces rápidos -->
                <div class="col-md-4 text-center mb-3">
                    <img src="../assets/img/logo.png" alt="Logo El Faro" width="100" class="mb-2">
                </div>

                <!-- Redes sociales -->
                <div class="col-md-4 text-center text-md-end mb-3 foot-Subtitulo">
                    <h6>Síguenos</h6>
                    <a href="https://www.facebook.com/" target="_blank" class="text-white me-2"><i
                            class="fa-brands fa-facebook"></i></a>
                    <a href="https://x.com/" target="_blank" class="text-white me-2"><i
                            class="fa-brands fa-x-twitter"></i></a>
                    <a href="https://www.instagram.com/" target="_blank" class="text-white me-2"><i
                            class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.youtube.com/" target="_blank" class="text-white"><i
                            class="fa-brands fa-youtube"></i></a>
                </div>

            </div>
            <hr class="border-light">
            <div class="text-center foot-Subtitulo">
                <small>&copy; 2026 El Faro. Todos los derechos reservados.</small>
            </div>
        </div>
    </footer>
</body>

<script src="../assets/js/contacto.js"></script>


<!-- Bootstrap JS Bundle (incluye Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

    <!--SweetAlert2-->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</html>
